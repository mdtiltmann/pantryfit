name: PantryFit Builder

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  deploy-all:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run deployer
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node deploy-all.js

      - name: Save progress
        run: |
          git config user.email "forge@pantryfit.app"
          git config user.name "FORGE Bot"
          git add -A
          git diff --staged --quiet || git commit -m "Deployed $(date +'%Y-%m-%d %H:%M UTC')"
          git push
